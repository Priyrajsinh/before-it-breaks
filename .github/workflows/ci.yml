name: CI
on: [push, pull_request]

# Unfixable CVEs (no fix version published as of 2026-05-20). See MANUAL_TASKS.md.
env:
  PIP_AUDIT_IGNORE: >-
    --ignore-vuln PYSEC-2025-210
    --ignore-vuln PYSEC-2025-194
    --ignore-vuln PYSEC-2025-196
    --ignore-vuln PYSEC-2025-195
    --ignore-vuln PYSEC-2025-193
    --ignore-vuln PYSEC-2025-192
    --ignore-vuln PYSEC-2026-139
    --ignore-vuln PYSEC-2025-191
    --ignore-vuln PYSEC-2025-197
    --ignore-vuln PYSEC-2025-189
    --ignore-vuln PYSEC-2025-190
    --ignore-vuln PYSEC-2024-274
    --ignore-vuln PYSEC-2024-271
    --ignore-vuln PYSEC-2024-277

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Install CPU torch
        run: python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install deps
        run: |
          python -m pip install -U pip wheel
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: black
        run: black --check src/ tests/
      - name: isort
        run: isort --check-only src/ tests/ --profile black
      - name: flake8
        run: flake8 src/ tests/
      - name: mypy
        run: mypy src/
      - name: bandit
        run: bandit -r src/ -ll -ii
      - name: radon
        run: radon cc src/ -nc
      - name: interrogate
        run: interrogate src/ --fail-under=80
      - name: pip-audit
        run: pip-audit -r requirements.txt ${{ env.PIP_AUDIT_IGNORE }}
      - name: detect-secrets
        run: detect-secrets scan --baseline .secrets.baseline
      # Download CMAPSS FD001 raw files so data-dependent tests can run.
      # The script skips files already present and matching their SHA-256 sidecars.
      # continue-on-error: unit tests use synthetic fixtures; a missing GitHub
      # release asset does not break the test suite.  Once the release is published
      # (see MANUAL_TASKS.md) this can be hardened to fail-on-error.
      - name: download-cmapss-data
        run: python scripts/download_cmapss.py
        continue-on-error: true
        env:
          CMAPSS_MIRROR_URL: ${{ vars.CMAPSS_MIRROR_URL || '' }}
      - name: pytest
        run: pytest tests/ -v --tb=short --cov=src --cov-fail-under=70
